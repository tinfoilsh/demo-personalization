# Tinfoil Containers release workflow (phase 2 — auto-triggered).
#
# DO NOT RUN MANUALLY. Dispatched by tinfoil-release.yml against the new release
# tag; it measures each image in tinfoil-config.yml, attests them, and publishes
# the GitHub release.

name: Tinfoil Release - Publish (auto-triggered)

run-name: Publish release ${{ github.ref_name }}

on:
  workflow_dispatch:

concurrency:
  group: tinfoil-container-release-${{ github.ref_name }}

jobs:
  measure-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Measure images, attest, and publish the release
        uses: tinfoilsh/measure-image-action@e9967c4a2dd60bacc7cce9e4315c5ebcd46118e9 # v0.9.2
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
