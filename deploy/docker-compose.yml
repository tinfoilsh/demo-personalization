# Local/dev wiring of the three containers. The trainer and serving share the
# one GPU (device 0); control has none. All three mount the shared `state`
# volume — control writes corpora there, trainer writes adapters there, serving
# reads adapters from there.
#
# This mirrors what the Tinfoil CVM declares (see tinfoil-config.yml); compose is
# the dev-box equivalent.

services:
  control:
    build:
      context: ..
      dockerfile: deploy/control.Dockerfile
    environment:
      STATE_DIR: /state
      SERVING_URL: http://serving:8000
      TRAINER_URL: http://trainer:9100
      DEMO_KEY: ${DEMO_KEY:-demo}
    volumes:
      - state:/state
    ports:
      - "9000:9000"
    depends_on: [trainer, serving]

  trainer:
    build:
      context: ..
      dockerfile: deploy/trainer.Dockerfile
    environment:
      STATE_DIR: /state
      BASE_MODEL: Qwen/Qwen3-4B-Instruct-2507
      TINFOIL_API_KEY: ${TINFOIL_API_KEY}   # for the in-enclave judge
    volumes:
      - state:/state
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  serving:
    build:
      context: ..
      dockerfile: deploy/serving.Dockerfile
    volumes:
      - state:/state            # so it can read adapters the trainer wrote
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]  # same physical GPU as trainer — shared
              capabilities: [gpu]

volumes:
  state:
